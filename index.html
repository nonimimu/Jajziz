<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NONIOAEY - Skin Builder Pro (Instant Load)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Mitr', 'sans-serif'] },
                    colors: { theme: { bg: '#020617', primary: '#1E3A8A', secondary: '#0F172A', text: '#F8FAFC' } },
                    boxShadow: { 'soft': '0 10px 25px -5px rgba(30, 58, 138, 0.5)', 'card': '0 4px 20px -2px rgba(0, 0, 0, 0.8)' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #020617; color: #F8FAFC; overflow-x: hidden; touch-action: manipulation; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #1E3A8A; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        
        .stage-wrapper { width: 100%; overflow-x: auto; overflow-y: hidden; padding-bottom: 20px; }
        #stage { padding: 40px 20px; display: flex; justify-content: flex-start; min-width: max-content; }
        #collage { display: flex; flex-wrap: wrap; width: var(--cw, 800px); min-width: var(--cw, 800px); }
        
        /* 🚨 บังคับรูปให้อยู่ในกล่องแบบเพอร์เฟกต์ โดยไม่ต้องดัดแปลงรูป */
        .item { 
            position: relative; 
            width: var(--w, 150px); 
            height: calc(var(--w) * 1.5); 
            margin-right: var(--mx, 0px); 
            margin-bottom: var(--my, 0px); 
            cursor: grab; 
            display: flex; 
            align-items: flex-end; /* เท้าติดพื้น */
            justify-content: center; 
        }
        
        .item img { 
            max-height: 100%; 
            max-width: 150%; 
            object-fit: contain; /* รักษาอัตราส่วน ไม่ยืด ไม่แหว่ง */
            object-position: bottom center; /* ดึงรูปลงมาติดพื้นล่างสุด */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)); 
            pointer-events: none; 
            transform: scale(var(--zoom, 1.2)); /* ซูมให้เต็มกล่องแบบเนียนๆ */
            transform-origin: bottom center;
        }
        
        .del { position: absolute; top: -5px; right: -5px; background: #EF4444; color: white; width: 24px; height: 24px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 9999; border: 2px solid #020617; font-size: 12px; }
        .item:hover .del { display: flex; }
        
        .glass-modal { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid #1E3A8A; }
        .skin-selected { border-color: #FFB6C1 !important; transform: scale(0.95); opacity: 0.8; }
        .skin-selected .check-icon { display: flex !important; }
        
        #load { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px); z-index: 50000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        
        .char-btn.active { background-color: #1E3A8A; color: white; border-color: #1E3A8A; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased selection:bg-theme-primary relative">

    <div class="max-w-4xl mx-auto min-h-screen bg-theme-bg sm:shadow-soft relative flex flex-col border-x border-theme-secondary">
        
        <header class="bg-gradient-to-br from-theme-secondary to-theme-bg pt-10 pb-8 px-6 text-center border-b border-theme-primary/30">
            <div class="inline-flex items-center gap-2 bg-theme-primary/20 px-6 py-2 rounded-full border border-theme-primary shadow-soft">
                <i data-lucide="sparkles" class="w-4 h-4 text-blue-400"></i>
                <h1 class="text-2xl font-bold tracking-[0.2em] text-white uppercase">NONIOAEY</h1>
                <i data-lucide="sparkles" class="w-4 h-4 text-blue-400"></i>
            </div>
            <p class="mt-2 text-xs text-slate-400">Instant Load Edition ⚡ (ทดสอบใน CodePen)</p>
        </header>

        <main class="flex-1 px-4 py-6 space-y-6">
            <section class="bg-theme-secondary rounded-[30px] p-5 shadow-card border border-theme-primary/20">
                <div class="grid grid-cols-5 gap-2 mb-6 text-center">
                    <div><label class="text-[9px] font-bold text-slate-400">สกิน/แถว</label><input type="number" id="cols" value="13" class="w-full bg-theme-bg border border-slate-700 text-white rounded-xl py-2 text-center text-sm font-bold outline-none focus:border-blue-500"></div>
                    <div><label class="text-[9px] font-bold text-slate-400">กว้าง (W)</label><input type="number" id="w" value="150" class="w-full bg-theme-bg border border-slate-700 text-white rounded-xl py-2 text-center text-sm font-bold outline-none focus:border-blue-500"></div>
                    <div><label class="text-[9px] font-bold text-slate-400">ซ้อน (X)</label><input type="number" id="mx" value="-30" class="w-full bg-theme-bg border border-slate-700 text-white rounded-xl py-2 text-center text-sm font-bold outline-none focus:border-blue-500"></div>
                    <div><label class="text-[9px] font-bold text-slate-400">ซ้อน (Y)</label><input type="number" id="my" value="-40" class="w-full bg-theme-bg border border-slate-700 text-white rounded-xl py-2 text-center text-sm font-bold outline-none focus:border-blue-500"></div>
                    <div><label class="text-[9px] font-bold text-pink-400">ซูมภาพ</label><input type="number" id="zoom" value="1.2" step="0.1" class="w-full bg-theme-primary/20 border border-theme-primary text-white rounded-xl py-2 text-center text-sm font-bold outline-none focus:border-pink-500"></div>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="openLibrary()" class="bg-theme-primary text-white py-4 rounded-2xl font-bold shadow-soft flex items-center justify-center gap-2 hover:bg-blue-700 transition-colors">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i> เลือกสกินหลายรูปพร้อมกัน
                    </button>
                    <div class="flex gap-2">
                        <button onclick="document.getElementById('file').click()" class="flex-1 bg-transparent text-blue-400 py-3 rounded-xl font-bold border-2 border-dashed border-theme-primary hover:bg-theme-primary/10">อัปโหลดเอง</button>
                        <button onclick="save()" class="flex-1 bg-white text-theme-bg py-3 rounded-xl font-bold shadow-card hover:bg-slate-200">บันทึกรูปภาพ</button>
                    </div>
                    <input type="file" id="file" multiple accept="image/*" class="hidden">
                </div>
            </section>

            <section class="bg-theme-secondary/50 rounded-[40px] border border-theme-primary/30 shadow-inner min-h-[500px] relative">
                <div class="stage-wrapper custom-scroll">
                    <div id="stage"><div id="collage"></div></div>
                </div>
                <div class="absolute bottom-4 right-4 text-xs text-slate-500 flex items-center gap-1 bg-theme-bg/80 px-3 py-1 rounded-full"><i data-lucide="move-horizontal" class="w-3 h-3"></i> เลื่อนซ้าย-ขวาได้</div>
            </section>
        </main>

        <div id="libraryModal" class="fixed inset-0 z-[10000] hidden flex items-center justify-center p-2 sm:p-4">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeLibrary()"></div>
            <div class="glass-modal w-full max-w-3xl h-[90vh] rounded-[30px] sm:rounded-[40px] shadow-2xl relative flex flex-col overflow-hidden">
                <div class="p-5 flex justify-between items-center border-b border-theme-primary/30 bg-theme-secondary/80">
                    <h3 class="text-lg sm:text-xl font-bold text-white flex items-center gap-2 italic"><i data-lucide="image" class="text-blue-400"></i> เลือกสกิน</h3>
                    <button onclick="closeLibrary()" class="w-8 h-8 rounded-full bg-theme-bg shadow-sm flex items-center justify-center font-bold text-slate-400 hover:text-white">✕</button>
                </div>
                
                <div class="px-5 py-3 space-y-3 bg-theme-secondary/50">
                    <input type="text" id="libSearch" placeholder="พิมพ์ชื่อตัวละครหรือสกิน..." class="w-full p-3 rounded-xl border border-theme-primary bg-theme-bg/80 text-white outline-none focus:border-pink-400 text-sm">
                    <div id="charFilter" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></div>
                </div>
                
                <div id="libGrid" class="flex-1 overflow-y-auto p-4 grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2 content-start pb-32"></div>

                <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-theme-bg via-theme-bg to-transparent">
                    <button onclick="confirmSelection()" id="confirmBtn" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 hover:bg-pink-400 transition-colors opacity-50 pointer-events-none">
                        เพิ่ม <span id="selectCount">0</span> สกินลงกระดาน
                    </button>
                </div>
            </div>
        </div>

        <div id="load">
            <i data-lucide="loader-2" class="w-14 h-14 text-pink-400 mb-4 animate-spin"></i>
            <h3 class="text-white font-bold text-xl tracking-widest uppercase mb-2">Loading...</h3>
        </div>

    </div>

    <script>
        lucide.createIcons();
        const collage = document.getElementById('collage');
        const load = document.getElementById('load');
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7BKWYQRWWJSCvoT8gnPcTzU0HGylpQp-tgx7ioueEydu-C8FdLM7nwpKwa_fjAVlpWAGVSHGZuL2X/pub?output=csv';
        let allSkins = [];
        let selectedSkins = []; 

        function updateZ() {
            const items = document.querySelectorAll('.item:not(.sortable-ghost)');
            let cols = Math.max(1, parseInt(document.getElementById('cols').value) || 1);
            items.forEach((item, i) => {
                let row = Math.floor(i / cols);
                let col = i % cols;             
                item.style.zIndex = (row * 1000) + (cols - col); 
            });
        }

        function refresh() {
            let cols = Math.max(1, parseInt(document.getElementById('cols').value) || 1);
            let w = parseFloat(document.getElementById('w').value) || 150;
            let mx = parseFloat(document.getElementById('mx').value) || 0;
            let my = parseFloat(document.getElementById('my').value) || 0;
            let zoom = parseFloat(document.getElementById('zoom').value) || 1.2;
            
            let exactWidth = w + ((cols - 1) * (w + mx)); 
            collage.style.setProperty('--cw', exactWidth + 'px');
            collage.style.setProperty('--w', w + 'px');
            collage.style.setProperty('--mx', mx + 'px');
            collage.style.setProperty('--my', my + 'px');
            collage.style.setProperty('--zoom', zoom);
            
            let totalItems = document.querySelectorAll('.item:not(.sortable-ghost)').length;
            if(totalItems > 0) {
                let rows = Math.ceil(totalItems / cols);
                let itemHeight = w * 1.5;
                let exactHeight = itemHeight + ((rows - 1) * (itemHeight + my));
                collage.style.height = exactHeight + 'px'; 
            }
            updateZ(); 
        }

        ['cols','w','mx','my','zoom'].forEach(id => document.getElementById(id).oninput = refresh);

        async function openLibrary() {
            document.getElementById('libraryModal').classList.remove('hidden');
            selectedSkins = []; 
            updateConfirmButton();

            if (allSkins.length === 0) {
                load.style.display = 'flex';
                try {
                    const res = await fetch(csvUrl);
                    const text = await res.text();
                    const rows = text.split('\n').slice(1);
                    allSkins = rows.map(r => {
                        const c = r.split(',');
                        const fileIdMatch = c[2]?.match(/[-\w]{25,}/);
                        const fileId = fileIdMatch ? fileIdMatch[0] : null;
                        return { 
                            char: c[0]?.trim() || 'General', 
                            name: c[1]?.trim() || 'Skin', 
                            // ใช้ลิงก์ w800 ทรงพลังสุด โหลดไว ไม่แตก
                            imgUrl: fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w800` : ''
                        };
                    }).filter(s => s.imgUrl);
                    renderFilters();
                    renderLibrary(allSkins);
                } catch (e) { alert("Error loading data."); }
                load.style.display = 'none';
            } else {
                renderLibrary(allSkins);
            }
        }

        function renderFilters() {
            const container = document.getElementById('charFilter');
            const chars = [...new Set(allSkins.map(s => s.char))];
            container.innerHTML = `<button onclick="filterChar('all', this)" class="char-btn active px-4 py-1.5 rounded-full bg-theme-secondary border border-theme-primary text-[10px] font-bold shadow-sm shrink-0">ทั้งหมด</button>` + 
                chars.map(c => `<button onclick="filterChar('${c}', this)" class="char-btn px-4 py-1.5 rounded-full bg-theme-bg border border-slate-700 text-[10px] font-bold shadow-sm shrink-0">${c}</button>`).join('');
        }

        function filterChar(name, btn) {
            document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = name === 'all' ? allSkins : allSkins.filter(s => s.char === name);
            renderLibrary(filtered);
        }

        function toggleSkinSelect(imgUrl, element) {
            const index = selectedSkins.indexOf(imgUrl);
            if (index > -1) {
                selectedSkins.splice(index, 1); 
                element.classList.remove('skin-selected');
            } else {
                selectedSkins.push(imgUrl); 
                element.classList.add('skin-selected');
            }
            updateConfirmButton();
        }

        function updateConfirmButton() {
            const btn = document.getElementById('confirmBtn');
            const count = document.getElementById('selectCount');
            count.innerText = selectedSkins.length;
            if (selectedSkins.length > 0) {
                btn.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                btn.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function renderLibrary(skins) {
            const grid = document.getElementById('libGrid');
            grid.innerHTML = skins.map(s => {
                const isSelected = selectedSkins.includes(s.imgUrl);
                return `
                <div onclick="toggleSkinSelect('${s.imgUrl}', this)" class="relative bg-theme-secondary p-1.5 rounded-2xl border-2 border-slate-700 hover:border-blue-400 transition-all cursor-pointer shadow-sm flex flex-col items-center ${isSelected ? 'skin-selected' : ''}">
                    <div class="check-icon absolute top-2 right-2 bg-pink-500 rounded-full p-1 hidden z-10 shadow-md">
                        <i data-lucide="check" class="w-3 h-3 text-white"></i>
                    </div>
                    <div class="w-full aspect-[3/4] bg-theme-bg/50 rounded-xl overflow-hidden flex items-end justify-center">
                        <img src="${s.imgUrl}" class="w-full h-full object-contain object-bottom">
                    </div>
                    <div class="text-center mt-1.5 w-full">
                        <p class="text-[8px] text-slate-400 truncate font-medium">${s.name}</p>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        document.getElementById('libSearch').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allSkins.filter(s => s.char.toLowerCase().includes(term) || s.name.toLowerCase().includes(term));
            renderLibrary(filtered);
        };

        function closeLibrary() { document.getElementById('libraryModal').classList.add('hidden'); }

        // 🚨 พอกดยืนยันปุ๊บ ภาพเด้งลงกระดานปั๊บ ไม่มีการหน่วงแล้ว!
        function confirmSelection() {
            closeLibrary();
            
            selectedSkins.forEach(url => {
                const div = document.createElement('div');
                div.className = 'item';
                // ตัด crossorigin ออกไปเลย เพื่อไม่ให้บราวเซอร์เรื่องมากเรื่องความปลอดภัย รูปจะได้ขึ้น 100%
                div.innerHTML = `<button class="del" onclick="this.parentElement.remove(); refresh();">✕</button><img src="${url}">`;
                collage.appendChild(div);
            });
            
            refresh();
            selectedSkins = []; 
        }

        document.getElementById('file').onchange = (e) => {
            const files = Array.from(e.target.files);
            if(!files.length) return;
            
            files.forEach(f => {
                const url = URL.createObjectURL(f);
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<button class="del" onclick="this.parentElement.remove(); refresh();">✕</button><img src="${url}">`;
                collage.appendChild(div);
            });
            
            refresh();
        };

        async function save() {
            if(!collage.children.length) return;
            load.style.display = 'flex';
            document.querySelectorAll('.del').forEach(b => b.style.display = 'none');
            
            await new Promise(r => setTimeout(r, 200));
            // อนุญาตให้โหลดรูปจากแหล่งอื่นมาทำภาพแคปหน้าจอได้
            const cvs = await html2canvas(collage, { scale: 2, backgroundColor: null, useCORS: true, allowTaint: true });
            const a = document.createElement('a');
            a.download = `NONIOAEY-Final.png`;
            a.href = cvs.toDataURL();
            a.click();
            
            document.querySelectorAll('.del').forEach(b => b.style.display = '');
            load.style.display = 'none';
        }

        new Sortable(collage, { 
            animation: 200, 
            delay: 150, 
            delayOnTouchOnly: true,
            ghostClass: 'opacity-30', 
            swapThreshold: 0.8, 
            forceFallback: true, 
            onEnd: refresh 
        });
        refresh();
    </script>
</body>
</html>
